<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Reloj AR - QR en tu muñeca</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#000000">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="icon-192.png">
    <link rel="stylesheet" href="styles/style.css">
</head>
<body>
    <video id="video" autoplay playsinline muted></video>
    <canvas id="overlay"></canvas>

    <div id="loading" class="activo">
        <div class="loader-icon">
            <svg viewBox="0 0 100 100" width="80" height="80">
                <circle cx="50" cy="50" r="40" fill="none" stroke="currentColor" stroke-width="3" opacity="0.3"/>
                <circle cx="50" cy="50" r="40" fill="none" stroke="currentColor" stroke-width="3"
                    stroke-dasharray="251" stroke-dashoffset="0" stroke-linecap="round">
                    <animate attributeName="stroke-dashoffset" from="251" to="0" dur="1.5s" repeatCount="indefinite"/>
                </circle>
            </svg>
        </div>
        <p class="loader-text">Iniciando cámara...</p>
    </div>

    <div id="reloj-encontrado" class="oculto">
        <div class="badge encontrado-badge">RELOJ ACTIVO</div>
    </div>

    <div id="reloj-perdido" class="oculto">
        <div class="badge perdido-badge">BUSCANDO QR...</div>
        <div class="qr-guia">
            <div class="qr-corners"></div>
            <p class="qr-instruccion">Enfoca el código QR en tu muñeca</p>
        </div>
    </div>

    <div id="info-hora">
        <span id="estado-texto">--:--:--</span>
    </div>

    <button id="btn-estilo" class="btn-estilo">
        <span id="nombre-estilo">Clásico Premium</span>
        <span class="btn-icono">↻</span>
    </button>

    <script src="js/jsqr.min.js"></script>
    <script src="js/reloj-canvas.js"></script>
    <script src="js/app.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('service-worker.js');
        }
    </script>
</body>
</html>
